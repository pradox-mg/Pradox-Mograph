<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pradox Motion Graphic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&family=Noto+Kufi+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05030e; --bg2:#080414; --deep:#0c0520;
  --p1:#3d1a8f; --p2:#6d28d9; --p3:#a855f7; --p4:#d8b4fe;
  --pink:#c2185b; --pink2:#e879a0; --pink3:#f8d7ea;
  --text:#ede8ff; --muted:#7264a0; --dim:#2e2550;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;cursor:none;}
#cur{width:8px;height:8px;background:var(--pink2);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;mix-blend-mode:screen;transition:transform .15s,background .2s;}
#cur-ring{width:36px;height:36px;border:1px solid rgba(168,85,247,.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:all .18s ease;}
#lang-btn{position:fixed;top:22px;left:22px;z-index:200;background:rgba(61,26,143,.15);border:1px solid rgba(168,85,247,.25);color:var(--p4);font-family:'DM Sans',sans-serif;font-size:.65rem;letter-spacing:2px;padding:9px 20px;cursor:none;transition:all .3s;backdrop-filter:blur(12px);border-radius:2px;}
#lang-btn:hover{background:rgba(61,26,143,.3);color:#fff;}

/* ADMIN */
#admin-toggle{position:fixed;bottom:24px;right:24px;z-index:300;background:rgba(61,26,143,.2);border:1px solid rgba(168,85,247,.25);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.55rem;letter-spacing:2px;padding:9px 18px;cursor:none;transition:all .3s;backdrop-filter:blur(12px);border-radius:2px;display:none;}
#admin-toggle:hover{background:rgba(194,24,91,.2);border-color:var(--pink2);color:var(--pink2);}
#admin-panel{position:fixed;bottom:70px;right:24px;z-index:300;background:rgba(8,4,20,.97);border:1px solid rgba(168,85,247,.25);border-radius:10px;padding:20px;backdrop-filter:blur(20px);display:none;min-width:260px;}
#admin-panel h3{font-family:'Big Shoulders Display',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--p3);margin-bottom:14px;}
.adm-btn{display:block;width:100%;padding:9px 14px;background:rgba(61,26,143,.15);border:1px solid rgba(168,85,247,.2);color:var(--p4);font-family:'DM Sans',sans-serif;font-size:.6rem;letter-spacing:2px;text-align:center;cursor:none;margin-bottom:8px;transition:all .3s;border-radius:4px;}
.adm-btn:hover{background:rgba(194,24,91,.15);border-color:var(--pink2);color:var(--pink2);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:24px 60px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;background:linear-gradient(to bottom,rgba(5,3,14,.92),transparent);backdrop-filter:blur(2px);}
.logo{font-family:'Big Shoulders Display',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:5px;text-decoration:none;color:var(--text);text-transform:uppercase;}
.logo em{font-style:normal;color:var(--pink2);}
.nav-links{display:flex;gap:40px;list-style:none;}
.nav-links a{font-family:'DM Sans',sans-serif;font-weight:300;font-size:.68rem;letter-spacing:3px;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .3s;position:relative;cursor:none;}
.nav-links a:hover{color:var(--pink2);}

/* HERO & SECTIONS */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:0 60px;}
.hero-content{position:relative;z-index:2;max-width:900px;}
.hero-title{font-family:'Big Shoulders Display',sans-serif;font-size:clamp(3.2rem,8vw,7.5rem);font-weight:700;line-height:1;margin-bottom:32px;}
.t-grad{background:linear-gradient(110deg,var(--p3) 0%,var(--pink2) 60%,var(--pink) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* WORKS GRID */
.works-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.vid-card{position:relative;border-radius:10px;overflow:hidden;background:var(--deep);border:1px solid rgba(168,85,247,.1);transition:all .5s;cursor:none;}
.vid-wrap{aspect-ratio:16/9;position:relative;overflow:hidden;}
.vid-info{padding:18px 20px 22px;}

/* MODALS */
.modal,#addModal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
.modal.open,#addModal.open{opacity:1;pointer-events:all;}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(15px);}
.add-modal-box{position:relative;z-index:1;background:var(--bg2);border:1px solid rgba(168,85,247,.25);border-radius:14px;padding:36px;width:100%;max-width:520px;}
.field-group{margin-bottom:16px;}
.field-group input, .field-group select, .field-group textarea {width:100%; padding:10px; background:#120a2e; border:1px solid #2e2550; color:#fff; border-radius:5px;}

/* UTILS */
.admin-only{display:none!important;}
body.admin-mode .admin-only{display:flex!important;}
.txt-ar{display:block;}.txt-en{display:none;}
html[lang="en"] .txt-ar{display:none;}html[lang="en"] .txt-en{display:block;}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>
<button id="lang-btn" onclick="toggleLang()">EN / AR</button>

<button id="admin-toggle" onclick="toggleAdminPanel()">⚙ ADMIN</button>
<div id="admin-panel">
  <h3>ADMIN PANEL</h3>
  <button class="adm-btn" onclick="openAddModal()">＋ إضافة مشروع جديد</button>
  <button class="adm-btn" onclick="exitAdmin()">✕ خروج</button>
</div>

<nav>
  <a href="#" class="logo">PRADOX <em>MG</em></a>
  <ul class="nav-links">
    <li><a href="#work"><span class="txt-ar">الأعمال</span><span class="txt-en">Work</span></a></li>
    <li><a href="#contact"><span class="txt-ar">تواصل</span><span class="txt-en">Contact</span></a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title">PRADOX<br><span class="t-grad">MOTION</span></h1>
  </div>
</section>

<section id="work" style="padding:60px;">
  <div class="works-grid" id="worksGrid">
    <div class="vid-card add-card admin-only" onclick="openAddModal()" style="display:flex; flex-direction:column; align-items:center; justify-content:center; border:2px dashed #3d1a8f; min-height:200px;">
      <div style="font-size:2rem;">＋</div>
      <div>ADD PROJECT</div>
    </div>
  </div>
</section>

<div class="modal" id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-box" style="width:80%; aspect-ratio:16/9; position:relative;">
    <iframe id="modalFrame" src="" style="width:100%; height:100%; border:none; display:none;"></iframe>
    <video id="modalVid" controls style="width:100%; height:100%; display:none;"></video>
  </div>
</div>

<div id="addModal">
  <div class="modal-bg" onclick="closeAddModal()"></div>
  <div class="add-modal-box">
    <h3>ADD NEW PROJECT</h3>
    <div class="field-group"><input type="text" id="inp-url" placeholder="Video URL (Youtube, Streamable...)" /></div>
    <div class="field-group"><input type="text" id="inp-title" placeholder="Project Title" /></div>
    <div class="field-group">
      <select id="inp-cat">
        <option value="موشن جرافيك|Motion Graphic">Motion Graphic</option>
        <option value="مونتاج|Video Edit">Video Edit</option>
      </select>
    </div>
    <div class="field-group"><textarea id="inp-desc" placeholder="Description"></textarea></div>
    <button class="adm-btn" onclick="confirmAddProject()">SAVE TO FIREBASE</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // إعداداتك الخاصة من Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCb5Auan7z00gBOH1179L8P-7HZsoWR_7o",
    authDomain: "pradox-portfolio.firebaseapp.com",
    projectId: "pradox-portfolio",
    storageBucket: "pradox-portfolio.firebasestorage.app",
    messagingSenderId: "714860051566",
    appId: "1:714860051566:web:d4397fd4ec98476408fa7f",
    measurementId: "G-PM7VRTNV3H"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const projectsCol = collection(db, "projects");

  window.cardData = {};

  // جلب البيانات لحظياً
  const q = query(projectsCol, orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    document.querySelectorAll('.vid-card:not(.add-card)').forEach(c => c.remove());
    snapshot.forEach((doc) => {
      const data = doc.data();
      const id = doc.id;
      window.cardData[id] = { type: data.type, src: data.videoSrc };
      
      const [catAr, catEn] = data.category.split('|');
      const html = `
        <div class="vid-card" id="${id}" onclick="cardClick('${id}')">
          <div class="vid-wrap" style="background:#0c0520; display:flex; align-items:center; justify-content:center; color:#3d1a8f; font-size:2rem;">▶</div>
          <div class="vid-info">
            <div style="color:var(--pink2); font-size:.6rem;">${catAr}</div>
            <div style="font-weight:bold; margin:5px 0;">${data.title.toUpperCase()}</div>
            <div style="color:var(--muted); font-size:.8rem;">${data.descAr}</div>
          </div>
        </div>`;
      document.querySelector('.add-card').insertAdjacentHTML('beforebegin', html);
    });
  });

  // إضافة مشروع جديد
  window.confirmAddProject = async () => {
    const url = document.getElementById('inp-url').value;
    const title = document.getElementById('inp-title').value || 'Untitled';
    const cat = document.getElementById('inp-cat').value;
    const desc = document.getElementById('inp-desc').value;

    if(!url) return alert("Please enter URL");
    const parsed = parseVideoUrl(url);

    try {
      await addDoc(projectsCol, {
        title: title,
        category: cat,
        descAr: desc,
        descEn: desc,
        type: parsed.type,
        videoSrc: parsed.id,
        createdAt: new Date()
      });
      closeAddModal();
    } catch(e) { alert("Error saving: " + e.message); }
  };
</script>

<script>
// الدوال المساعدة
function toggleLang(){const h=document.documentElement; h.lang=h.lang==='ar'?'en':'ar'; h.dir=h.lang==='ar'?'rtl':'ltr';}

// ADMIN SECRET: Ctrl+Shift+A
const ADMIN_PASS='pradox2025';
document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.shiftKey&&e.key==='A'){
    const pw=prompt('Password:');
    if(pw===ADMIN_PASS){
      document.body.classList.add('admin-mode');
      document.getElementById('admin-toggle').style.display='block';
    }
  }
});
function toggleAdminPanel(){ const p=document.getElementById('admin-panel'); p.style.display=p.style.display==='block'?'none':'block'; }
function exitAdmin(){ document.body.classList.remove('admin-mode'); document.getElementById('admin-toggle').style.display='none'; }

function openAddModal(){ document.getElementById('addModal').classList.add('open'); }
function closeAddModal(){ document.getElementById('addModal').classList.remove('open'); }

function parseVideoUrl(url){
  if(url.includes('youtube.com')||url.includes('youtu.be')) return {type:'yt', id: url.split('v=')[1] || url.split('/').pop()};
  if(url.includes('streamable.com')) return {type:'streamable', id: url.split('/').pop()};
  return {type:'iframe', id: url};
}

function cardClick(id){
  const d = window.cardData[id];
  const modal = document.getElementById('modal'), frame = document.getElementById('modalFrame');
  frame.src = d.type==='yt' ? `https://www.youtube.com/embed/${d.src}` : d.type==='streamable' ? `https://streamable.com/e/${d.src}` : d.src;
  frame.style.display='block';
  modal.classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); document.getElementById('modalFrame').src=''; }

// Cursor logic
const cur=document.getElementById('cur'), ring=document.getElementById('cur-ring');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX-4+'px'; cur.style.top=e.clientY-4+'px';
  ring.style.left=e.clientX-18+'px'; ring.style.top=e.clientY-18+'px';
});
</script>
</body>
</html>
