<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PRADOX MG — Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#05030e; --bg2:#080414; --deep:#0c0520;
  --p1:#3d1a8f; --p2:#6d28d9; --p3:#a855f7; --p4:#d8b4fe;
  --pink:#c2185b; --pink2:#e879a0;
  --text:#ede8ff; --muted:#7264a0; --dim:#2e2550;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 32px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(5,3,14,.95),transparent);}
.logo{font-family:'Big Shoulders Display',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:3px;color:var(--text);text-decoration:none;}
.logo em{font-style:normal;color:var(--pink2);}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(168,85,247,.2);padding:8px 18px;border-radius:4px;transition:all .3s;background:rgba(61,26,143,.08);}
.back-btn:hover{color:var(--pink2);border-color:var(--pink2);}
.back-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;}

/* BLOB BG */
.blob-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.blob{position:absolute;border-radius:50%;filter:blur(60px);will-change:transform;}
.blob1{width:500px;height:500px;background:radial-gradient(circle,rgba(61,26,143,.4) 0%,transparent 70%);top:-150px;right:-80px;}
.blob2{width:350px;height:350px;background:radial-gradient(circle,rgba(194,24,91,.2) 0%,transparent 70%);bottom:-60px;left:-60px;}

/* VIDEO AREA */
.video-wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;padding:80px 20px 40px;}
.video-container{width:100%;max-width:1000px;position:relative;}
.video-frame-wrap{position:relative;width:100%;border-radius:12px;overflow:hidden;border:1px solid rgba(168,85,247,.2);box-shadow:0 0 60px rgba(61,26,143,.3);}
.video-frame-wrap iframe{display:block;width:100%;border:none;}

/* INFO */
.video-info{margin-top:20px;text-align:center;}
.video-title{font-family:'Big Shoulders Display',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--text);}
.video-cat{font-size:.6rem;letter-spacing:3px;color:var(--pink2);text-transform:uppercase;margin-top:6px;}
</style>
</head>
<body>

<div class="blob-wrap"><div class="blob blob1"></div><div class="blob blob2"></div></div>

<nav>
  <a href="index.html" class="logo">PRADOX <em>MG</em></a>
  <a href="javascript:history.back()" class="back-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    رجوع
  </a>
</nav>

<div class="video-wrap">
  <div class="video-container">
    <div class="video-frame-wrap" id="frameWrap">
      <!-- الفيديو بيتحط هنا تلقائي -->
    </div>
    <div class="video-info">
      <div class="video-title" id="vidTitle">PROJECT</div>
      <div class="video-cat" id="vidCat">PRADOX MG</div>
    </div>
  </div>
</div>

<script>
// قراءة البارامترز من الرابط
const params = new URLSearchParams(window.location.search);
const type = params.get('type') || 'streamable';
const src  = params.get('src')  || '';
const title= params.get('title')|| 'PROJECT';
const cat  = params.get('cat')  || 'PRADOX MG';

document.getElementById('vidTitle').textContent = title.toUpperCase();
document.getElementById('vidCat').textContent   = cat.toUpperCase();
document.title = 'PRADOX MG — ' + title;

const wrap = document.getElementById('frameWrap');
let html = '';

if(type === 'yt'){
  wrap.style.aspectRatio = '16/9';
  html = `<iframe src="https://www.youtube.com/embed/${src}?autoplay=1&rel=0" allowfullscreen allow="autoplay; fullscreen" style="width:100%;height:100%;position:absolute;inset:0;"></iframe>`;
  wrap.style.position='relative'; wrap.style.paddingBottom='56.25%';
} else if(type === 'streamable'){
  wrap.style.aspectRatio = '';
  wrap.style.paddingBottom = '177.778%';
  wrap.style.position = 'relative';
  html = `<iframe src="https://streamable.com/e/${src}" allowfullscreen allow="autoplay; fullscreen" style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>`;
} else if(type === 'vimeo'){
  wrap.style.aspectRatio = '16/9';
  wrap.style.paddingBottom = '56.25%';
  wrap.style.position = 'relative';
  html = `<iframe src="https://player.vimeo.com/video/${src}?autoplay=1" allowfullscreen allow="autoplay; fullscreen" style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>`;
} else if(type === 'gdrive'){
  wrap.style.aspectRatio = '16/9';
  wrap.style.paddingBottom = '56.25%';
  wrap.style.position = 'relative';
  html = `<iframe src="https://drive.google.com/file/d/${src}/preview" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>`;
} else {
  wrap.style.paddingBottom = '56.25%';
  wrap.style.position = 'relative';
  html = `<iframe src="${src}" allowfullscreen allow="autoplay; fullscreen" style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>`;
}

wrap.innerHTML = html;
</script>
</body>
</html>
